name: Daily Internship Scraper

on:
  schedule:
    # Run daily at 12:00 UTC (5:30 PM IST)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit and push updated listings.json

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: |
          python scraper.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add listings.json
          
          # Only commit and push if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-update internship listings [skip ci]"
            git push
          else
            echo "No changes in listings.json"
          fi
